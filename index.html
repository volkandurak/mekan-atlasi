<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mekan Atlası · İstanbul</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1a1a2e}
body{font-family:'Nunito',sans-serif;display:flex;flex-direction:column;max-width:430px;margin:0 auto;height:100vh;position:relative;}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.screen.active{display:flex}

/* ── NOTIF ── */
.notif{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;background:#111;color:#fff;padding:9px 20px;border-radius:30px;font-size:13px;font-weight:700;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}

/* ════════════════════════════
   HOME — WHEEL SCREEN
════════════════════════════ */
#sc-home{position:relative;overflow:hidden}

/* Harita arka plan */
#bgMap{position:absolute;inset:0;z-index:0}

/* Harita üstü karartma */
.map-fog{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse at center, rgba(10,10,30,.35) 0%, rgba(10,10,30,.65) 100%);
  pointer-events:none;
}

/* En üst başlık */
.home-header{
  position:absolute;top:0;left:0;right:0;z-index:10;
  padding:18px 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom, rgba(10,10,30,.8) 0%, transparent 100%);
}
.header-title{
  font-size:22px;font-weight:900;color:#fff;
  letter-spacing:.5px;text-shadow:0 2px 12px rgba(0,0,0,.5);
}
.header-title span{color:#64B5F6}
.header-profile{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;
  color:#fff;
}

/* Alt tab bar */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:400;
  display:flex;
  background:rgba(15,15,35,.95);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,.08);
  padding-bottom:env(safe-area-inset-bottom,0px);
  transition:transform .25s ease, opacity .25s ease;
}
.tab-bar.hidden{
  transform:translateY(100%);
  opacity:0;
  pointer-events:none;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;cursor:pointer;gap:3px;
  color:rgba(255,255,255,.4);font-size:10px;font-weight:800;
  transition:color .15s;
}
.tab-item.active{color:#64B5F6}
.tab-ico{font-size:20px;line-height:1}

/* ── WHEEL CONTAINER ── */
#wheelWrap{
  position:absolute;inset:0;z-index:5;
  display:flex;align-items:center;justify-content:center;
}
#wheelCanvas{position:absolute;inset:0;pointer-events:none}

/* Merkez daire */
#wheelCenter{
  position:absolute;
  width:110px;height:110px;
  border-radius:50%;
  background:rgba(15,15,35,.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:2.5px solid rgba(255,255,255,.2);
  box-shadow:0 0 0 8px rgba(255,255,255,.04), 0 8px 40px rgba(0,0,0,.5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  z-index:8;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  transform-origin:center;
}
#wheelCenter:active{transform:scale(.96)}
#centerCityLine{font-size:9px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
#centerTitle{font-size:17px;font-weight:900;color:#fff;text-align:center;line-height:1.15;letter-spacing:-.3px;}
#centerSub{font-size:8px;font-weight:700;color:rgba(255,255,255,.4);margin-top:3px;text-align:center;}

/* Segment butonları (DOM) */
.seg-btn{
  position:absolute;
  transform-origin:center;
  cursor:pointer;
  z-index:7;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
  transform:translate(-50%,-50%) scale(1);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), opacity .18s;
}
.seg-btn:active .seg-inner{transform:scale(.92)}
.seg-inner{
  width:64px;height:64px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 16px rgba(0,0,0,.35);
  border:2px solid rgba(255,255,255,.25);
  transition:transform .12s, box-shadow .12s;
  padding:6px;
  flex-shrink:0;
}
.seg-inner-txt{
  font-size:11px;font-weight:900;color:#fff;
  text-align:center;line-height:1.3;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
  word-break:keep-all;
  white-space:normal;
}
.seg-lbl{
  position:absolute;
  font-size:11px;font-weight:800;color:#fff;
  text-align:center;line-height:1.3;
  text-shadow:0 1px 8px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,.9);
  width:80px;
  pointer-events:none;
  white-space:normal;
  word-break:keep-all;
}

/* Sub mode — alt kategoriler */
.sub-node{
  position:absolute;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1), opacity .25s ease;
  z-index:12;
  cursor:pointer;
}
.sub-node.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
.sub-node:active .sub-inner{transform:scale(.92)}
.sub-inner{
  background:rgba(20,20,45,.9);
  backdrop-filter:blur(8px);
  border-radius:14px;
  padding:9px 11px 10px;
  width:92px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  text-align:center;
  border-bottom:3px solid var(--c,#fff);
  border-top:1px solid rgba(255,255,255,.1);
  transition:transform .12s;
}
.sub-ico{width:26px;height:26px;border-radius:7px;padding:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sub-ico svg{width:100%;height:100%}
.sub-name{font-size:10px;font-weight:800;color:#fff;line-height:1.25;}
.sub-cnt{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.4)}

/* FAB */
#fabBtn{
  position:fixed;bottom:80px;right:18px;z-index:300;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#64B5F6,#1565C0);
  box-shadow:0 4px 20px rgba(21,101,192,.5);
  display:none;align-items:center;justify-content:center;
  font-size:26px;color:#fff;cursor:pointer;border:none;
}

/* ════════════════════════════
   MAP SCREEN
════════════════════════════ */
#sc-map{position:relative}
.map-topbar{
  padding:14px 16px 10px;
  background:rgba(15,15,35,.95);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.back-btn{
  width:36px;height:36px;background:rgba(255,255,255,.1);
  border-radius:12px;border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;flex-shrink:0;
}
.map-chips-wrap{
  overflow-x:auto;flex:1;scrollbar-width:none;
  display:flex;gap:6px;
}
.map-chips-wrap::-webkit-scrollbar{display:none}
.chip{
  white-space:nowrap;padding:6px 13px;
  border-radius:20px;border:none;
  background:rgba(255,255,255,.1);
  color:rgba(255,255,255,.7);
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  cursor:pointer;flex-shrink:0;
}
.chip.on{background:#64B5F6;color:#fff}
#map{flex:1}
#mapLoading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,15,35,.8);color:#fff;font-weight:700;font-size:14px;z-index:10}

/* Yakın Mekanlar Paneli */
#nearbyPanel{
  position:fixed;bottom:0;left:0;right:0;z-index:490;
  background:rgba(12,12,30,.97);
  backdrop-filter:blur(20px);
  border-radius:22px 22px 0 0;
  border-top:1px solid rgba(255,255,255,.1);
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.34,1.2,.64,1);
  max-height:75vh;
  display:flex;flex-direction:column;
}
#nearbyPanel.open{transform:none}
.nearby-handle{width:36px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin:14px auto 0}
.nearby-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px 10px;flex-shrink:0;
}
.nearby-title{font-size:16px;font-weight:900;color:#fff}
.nearby-sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:600;margin-top:1px}
.nearby-close{
  width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);
  border:none;color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.nearby-list{overflow-y:auto;flex:1;padding:0 12px 100px;}
.nearby-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 8px;border-bottom:1px solid rgba(255,255,255,.05);
  cursor:pointer;border-radius:10px;
  transition:background .15s;
}
.nearby-item:active{background:rgba(255,255,255,.06)}
.nearby-ico{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.nearby-info{flex:1;min-width:0}
.nearby-name{font-size:13px;font-weight:800;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nearby-meta{font-size:11px;color:rgba(255,255,255,.4);font-weight:600;margin-top:2px}
.nearby-dist{
  font-size:12px;font-weight:800;color:#64B5F6;
  flex-shrink:0;text-align:right;
}
.nearby-badge{
  display:inline-block;padding:2px 7px;border-radius:8px;
  font-size:9px;font-weight:800;color:#fff;margin-top:3px;
}

/* Yarıçap seçici */
.radius-tabs{
  display:flex;gap:6px;padding:0 18px 10px;flex-shrink:0;
}
.radius-tab{
  padding:5px 12px;border-radius:20px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);
  transition:all .15s;
}
.radius-tab.on{background:#64B5F6;color:#fff;}

/* Harita üstü butonlar */
#mapFab{
  position:absolute;bottom:16px;right:16px;z-index:40;
  display:flex;flex-direction:column;gap:10px;
}
.map-fab-btn{
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:transform .15s;
}
.map-fab-btn:active{transform:scale(.9)}
#btnMyLocation{background:#fff;color:#333;}
#btnNearbyTap{background:#64B5F6;color:#fff;font-size:18px;}

/* Konum halkası haritada */
.location-pulse{
  width:16px;height:16px;border-radius:50%;
  background:#4285F4;border:2px solid #fff;
  box-shadow:0 0 0 0 rgba(66,133,244,.4);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(66,133,244,.5)}
  70%{box-shadow:0 0 0 12px rgba(66,133,244,0)}
  100%{box-shadow:0 0 0 0 rgba(66,133,244,0)}
}

/* Popup */
.popup{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(15,15,35,.98);
  backdrop-filter:blur(16px);
  border-radius:22px 22px 0 0;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.34,1.2,.64,1);
  border-top:1px solid rgba(255,255,255,.08);
  max-height:82vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.popup.visible{transform:none}
.pop-handle{width:36px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 0;padding-top:14px}
.pop-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;color:#fff;margin-bottom:8px}
.pop-name{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.3px;margin-bottom:4px}
.pop-addr{font-size:12px;color:rgba(255,255,255,.5);font-weight:600;margin-bottom:6px}
.pop-desc{font-size:13px;color:rgba(255,255,255,.7);font-weight:600;line-height:1.5;margin-bottom:10px}
.pop-tags{display:flex;flex-wrap:wrap;gap:5px}
.popup-tag{padding:4px 10px;background:rgba(255,255,255,.08);border-radius:20px;font-size:10px;font-weight:700;color:rgba(255,255,255,.6)}

/* Popup fotoğraf galerisi */
.pop-photos{
  display:flex;flex-direction:column;gap:6px;margin-bottom:14px;
}
.pop-photos-main{
  width:100%;height:200px;border-radius:14px;
  object-fit:cover;background:rgba(255,255,255,.06);
}
.pop-photos-row{
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
}
.pop-photos-row::-webkit-scrollbar{display:none}
.pop-photo{
  flex-shrink:0;width:110px;height:80px;border-radius:10px;
  object-fit:cover;background:rgba(255,255,255,.06);cursor:pointer;
  transition:opacity .15s;
}
.pop-photo:active{opacity:.7}
.pop-photo-placeholder{
  flex-shrink:0;width:140px;height:100px;border-radius:12px;
  background:rgba(255,255,255,.06);display:flex;align-items:center;
  justify-content:center;font-size:28px;color:rgba(255,255,255,.2);
}

/* Rating */
.pop-rating{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.pop-stars{color:#FFD54F;font-size:14px;letter-spacing:1px}
.pop-rating-num{font-size:13px;font-weight:800;color:#FFD54F}
.pop-rating-cnt{font-size:11px;color:rgba(255,255,255,.4);font-weight:600}

/* Saatler */
.pop-hours{margin-bottom:14px}
.pop-hours-toggle{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:8px 12px;background:rgba(255,255,255,.05);border-radius:10px;
}
.pop-open-badge{
  font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;
}
.pop-open-badge.open{background:rgba(76,175,80,.2);color:#81C784}
.pop-open-badge.closed{background:rgba(244,67,54,.2);color:#E57373}
.pop-open-badge.unknown{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
.pop-hours-today{font-size:12px;font-weight:700;color:rgba(255,255,255,.7);flex:1}
.pop-hours-chevron{font-size:12px;color:rgba(255,255,255,.3);transition:transform .2s}
.pop-hours-chevron.open{transform:rotate(180deg)}
.pop-hours-list{
  display:none;padding:8px 12px;
  background:rgba(255,255,255,.03);border-radius:0 0 10px 10px;
  margin-top:1px;
}
.pop-hours-list.show{display:block}
.pop-hours-row{
  display:flex;justify-content:space-between;
  font-size:11px;font-weight:600;color:rgba(255,255,255,.5);
  padding:3px 0;
}
.pop-hours-row.today{color:#fff;font-weight:800}

/* İletişim */
.pop-contact{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.pop-contact-row{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;color:rgba(255,255,255,.7);
}
.pop-contact-ico{font-size:15px;width:20px;text-align:center}

/* Aksiyon butonları */
.pop-actions{display:flex;gap:8px;margin-top:14px}
.pop-action-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:11px 8px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  transition:opacity .15s;
}
.pop-action-btn:active{opacity:.7}
.pop-action-btn.primary{background:#4285F4;color:#fff}
.pop-action-btn.secondary{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}
.pop-action-btn.maps{background:#34A853;color:#fff}

/* Street View */
.pop-streetview{
  width:100%;height:140px;border-radius:12px;overflow:hidden;
  margin-bottom:14px;background:rgba(255,255,255,.05);
  position:relative;
}
.pop-streetview iframe{width:100%;height:100%;border:none}
.pop-sv-overlay{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:6px;
  font-size:12px;font-weight:700;color:rgba(255,255,255,.3);
}

/* Loading spinner */
.pop-loading{
  display:flex;align-items:center;justify-content:center;
  padding:20px;gap:8px;font-size:12px;color:rgba(255,255,255,.4);
}
.pop-spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.1);
  border-top-color:rgba(255,255,255,.5);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════════════════════
   LIST SCREEN
════════════════════════════ */
#sc-list{background:#0f0f1f}
.list-topbar{padding:16px 18px 12px;background:rgba(15,15,35,.98);flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06)}
.list-topbar h2{font-size:20px;font-weight:900;color:#fff}
.list-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;scrollbar-width:none}
.list-body::-webkit-scrollbar{display:none}
.list-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border-radius:14px;padding:12px 13px;cursor:pointer}
.list-item-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:8px}
.list-item-ico svg{width:100%;height:100%}
.list-item-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.2px}
.list-item-sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:700;margin:2px 0}
.list-item-addr{font-size:11px;color:rgba(255,255,255,.35);font-weight:600}

/* ════════════════════════════
   PROFILE SCREEN
════════════════════════════ */
#sc-profile{background:#0f0f1f;align-items:center;justify-content:center}
.profile-body{padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;width:100%}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:rgba(100,181,246,.15);border:2px solid rgba(100,181,246,.3);display:flex;align-items:center;justify-content:center;font-size:36px}
.profile-name{font-size:20px;font-weight:900;color:#fff}
.profile-role{font-size:12px;color:rgba(255,255,255,.4);font-weight:700}
.profile-btn{width:100%;max-width:280px;padding:14px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:rgba(100,181,246,.15);color:#64B5F6;border:1px solid rgba(100,181,246,.2)}
.profile-btn.danger{background:rgba(229,57,53,.12);color:#EF9A9A;border-color:rgba(229,57,53,.2)}

/* ════════════════════════════
   BOTTOM SHEETS
════════════════════════════ */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#1a1a2e;border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;padding:18px 20px 36px;animation:sheetUp .22s ease;border-top:1px solid rgba(255,255,255,.08)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.sheet-handle{width:36px;height:3.5px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.4px;margin-bottom:14px}
.form-label{display:block;font-size:10px;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:11px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;padding:11px 13px;outline:none;margin-bottom:13px;appearance:none}
.form-textarea{height:76px;resize:none}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.form-tag{padding:5px 12px;background:rgba(255,255,255,.07);border-radius:20px;font-size:11.5px;font-weight:700;color:rgba(255,255,255,.6);cursor:pointer;border:1px solid rgba(255,255,255,.08);font-family:'Nunito',sans-serif}
.form-tag.on{background:#64B5F6;color:#fff;border-color:#64B5F6}
.sheet-btn{width:100%;background:#64B5F6;color:#fff;border:none;padding:13px;border-radius:13px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer}

<body>

<div class="notif" id="notif"></div>

<!-- ════ HOME ════ -->
<div class="screen active" id="sc-home">
  <!-- Arka plan harita -->
  <div id="bgMap"></div>
  <div class="map-fog"></div>

  <!-- Üst başlık -->
  <div class="home-header">
    <div class="header-title">MEKAN <span>ATLASI</span></div>
    <div style="display:flex;gap:8px;align-items:center">
      <div id="mapToggleBtn" onclick="toggleMapTheme()" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;color:#fff;user-select:none" title="Harita temasını değiştir">🌙</div>
      <div class="header-profile" onclick="goTab('profile', document.getElementById('tab-prof'))">👤</div>
    </div>
  </div>

  <!-- Wheel -->
  <div id="wheelWrap">
    <canvas id="wheelCanvas"></canvas>
    <div id="wheelCenter" onclick="onCenterClick()">
      <div id="centerCityLine">İSTANBUL</div>
      <div id="centerTitle">Keşfet</div>
      <div id="centerSub">12 kategori</div>
    </div>
    <div id="segContainer"></div>
    <div id="subContainer"></div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab-item active" id="tab-home" onclick="goTab('home',this)">
      <div class="tab-ico">🗺</div><span>Keşfet</span>
    </div>
    <div class="tab-item" id="tab-map" onclick="goTab('map',this)">
      <div class="tab-ico">📍</div><span>Harita</span>
    </div>
    <div class="tab-item" id="tab-list" onclick="goTab('list',this)">
      <div class="tab-ico">☰</div><span>Liste</span>
    </div>
    <div class="tab-item" id="tab-prof" onclick="goTab('profile',this)">
      <div class="tab-ico">👤</div><span>Profil</span>
    </div>
  </div>

  <button id="fabBtn" onclick="openAddSheet()">+</button>
</div>

<!-- ════ MAP ════ -->
<div class="screen" id="sc-map">
  <div class="map-topbar">
    <button class="back-btn" onclick="goTab('home',document.getElementById('tab-home'))">←</button>
    <div class="map-chips-wrap" id="mapChips"></div>
  </div>
  <div style="position:relative;flex:1">
    <div id="map" style="width:100%;height:100%"></div>
    <div id="mapLoading">Harita yükleniyor…</div>

    <!-- Harita FAB butonları -->
    <div id="mapFab">
      <button class="map-fab-btn" id="btnMyLocation" onclick="goToMyLocation()" title="Konumuma Git">📍</button>
      <button class="map-fab-btn" id="btnNearbyTap" onclick="toggleTapMode()" title="Yakın Mekanlar">🔍</button>
    </div>

    <div class="popup" id="popup">
      <div style="padding:0 18px 28px">
        <div class="pop-handle"></div>
        <div style="padding-top:14px">
          <div class="pop-badge" id="popBadge"></div>
          <div class="pop-name" id="popName"></div>
          <div class="pop-addr" id="popAddr"></div>
          <div class="pop-rating" id="popRating" style="display:none"></div>
        </div>

        <!-- Fotoğraflar -->
        <div class="pop-photos" id="popPhotos" style="display:none"></div>

        <!-- Street View -->
        <div class="pop-streetview" id="popStreetView" style="display:none">
          <div class="pop-sv-overlay" id="popSvOverlay">🌐<span>Street View yükleniyor...</span></div>
          <iframe id="popSvFrame" allowfullscreen style="display:none"></iframe>
        </div>

        <!-- Yükleniyor -->
        <div class="pop-loading" id="popLoading" style="display:none">
          <div class="pop-spinner"></div><span>Google verisi yükleniyor...</span>
        </div>

        <div class="pop-desc" id="popDesc"></div>
        <div class="pop-tags" id="popTags"></div>

        <!-- Saatler -->
        <div class="pop-hours" id="popHours" style="display:none;margin-top:12px">
          <div class="pop-hours-toggle" onclick="toggleHours()">
            <span class="pop-open-badge" id="popOpenBadge">—</span>
            <span class="pop-hours-today" id="popHoursToday">Saatler bilinmiyor</span>
            <span class="pop-hours-chevron" id="popHoursChevron">▾</span>
          </div>
          <div class="pop-hours-list" id="popHoursList"></div>
        </div>

        <!-- İletişim -->
        <div class="pop-contact" id="popContact" style="display:none;margin-top:10px"></div>

        <!-- Aksiyonlar -->
        <div class="pop-actions">
          <button class="pop-action-btn maps" id="popMapsBtn" onclick="openInMaps()">🗺 Yol Tarifi</button>
          <button class="pop-action-btn primary" id="popGoogleBtn" onclick="openInGoogle()">🔍 Google'da Ara</button>
          <button class="pop-action-btn secondary" onclick="closePopup()">✕</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════ NEARBY PANEL ════ -->
<div id="nearbyPanel">
  <div class="nearby-handle"></div>
  <div class="nearby-header">
    <div>
      <div class="nearby-title" id="nearbyTitle">Yakın Mekanlar</div>
      <div class="nearby-sub" id="nearbySub">Konum seçiliyor...</div>
    </div>
    <button class="nearby-close" onclick="closeNearby()">✕</button>
  </div>
  <div class="radius-tabs" id="radiusTabs">
    <button class="radius-tab on" onclick="setRadius(100,this)">100m</button>
    <button class="radius-tab" onclick="setRadius(250,this)">250m</button>
    <button class="radius-tab" onclick="setRadius(500,this)">500m</button>
    <button class="radius-tab" onclick="setRadius(1000,this)">1km</button>
  </div>
  <div class="nearby-list" id="nearbyList"></div>
</div>

<!-- ════ LIST ════ -->
<div class="screen" id="sc-list">
  <div class="list-topbar"><h2>Tüm Mekanlar</h2></div>
  <div class="list-body" id="listEl"></div>
</div>

<!-- ════ PROFILE ════ -->
<div class="screen" id="sc-profile">
  <div class="profile-body">
    <div class="profile-avatar">🗺</div>
    <div class="profile-name">Mekan Atlası</div>
    <div class="profile-role" id="profileRole">Ziyaretçi</div>
    <button class="profile-btn" id="modBtn" onclick="promptLogin()">Moderatör Girişi</button>
    <button class="profile-btn danger" id="modLogout" style="display:none" onclick="logoutMod()">Çıkış Yap</button>
  </div>
</div>

<!-- SHEETS -->
<div class="overlay" id="loginSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Moderatör Girişi</div>
    <label class="form-label">Şifre</label>
    <input class="form-input" id="pwInput" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pw-error" id="pwError">✕ Hatalı şifre</div>
    <button class="sheet-btn" onclick="checkPw()">Giriş Yap</button>
  </div>
</div>

<div class="overlay" id="addSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Mekan Ekle</div>
    <label class="form-label">Mekan Adı *</label>
    <input class="form-input" id="fName" placeholder="Mekan adı…">
    <label class="form-label">Kategori *</label>
    <select class="form-select" id="fCat" onchange="fillSubs()"></select>
    <label class="form-label">Alt Kategori</label>
    <select class="form-select" id="fSub"></select>
    <label class="form-label">Adres *</label>
    <input class="form-input" id="fAddr" placeholder="Adres…">
    <div class="form-row2">
      <div><label class="form-label">Enlem</label><input class="form-input" id="fLat" placeholder="41.00…"></div>
      <div><label class="form-label">Boylam</label><input class="form-input" id="fLng" placeholder="28.97…"></div>
    </div>
    <label class="form-label">Açıklama</label>
    <textarea class="form-textarea" id="fDesc" placeholder="Kısa açıklama…"></textarea>
    <label class="form-label">Etiketler</label>
    <div class="tag-row" id="fTagsEl"></div>
    <button class="sheet-btn" onclick="savePlace()">Kaydet</button>
  </div>
</div>

/* ════════════════ WHEEL ════════════════ */
let wheelMode = 'home'; // 'home' | 'sub'
let activeCat = null;
const SEG_RADIUS = 130; // px, segment merkezlerin uzaklığı
const SUB_RADIUS = 130;

function initWheel(){
  drawWheelConnectors();
  buildSegments();
}

function drawWheelConnectors(){
  const canvas = document.getElementById('wheelCanvas');
  const wrap   = document.getElementById('wheelWrap');
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx = canvas.width/2;
  const cy = canvas.height/2;
  const n  = CATS.length;
  CATS.forEach((_,i)=>{
    const angle = -Math.PI/2 + (2*Math.PI*i)/n;
    const ex = cx + SEG_RADIUS*Math.cos(angle);
    const ey = cy + SEG_RADIUS*Math.sin(angle);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(ex,ey);
    ctx.strokeStyle='rgba(255,255,255,0.08)';
    ctx.lineWidth=1;
    ctx.stroke();
  });
  // Dış halka
  ctx.beginPath();
  ctx.arc(cx,cy,SEG_RADIUS+32,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=1;
  ctx.stroke();
  // İç halka
  ctx.beginPath();
  ctx.arc(cx,cy,60,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1;
  ctx.stroke();
}

function buildSegments(){
  const wrap = document.getElementById('wheelWrap');
  const cont = document.getElementById('segContainer');
  cont.innerHTML='';
  const cx = wrap.offsetWidth/2;
  const cy = wrap.offsetHeight/2;
  const n  = CATS.length;
  const CIRC_R = 30;     // daire yarıçapı
  const LBL_GAP = 6;     // daire kenarı ile etiket arası boşluk
  const LBL_DIST = CIRC_R + LBL_GAP; // daire merkezinden etiket kenarına

  CATS.forEach((cat,i)=>{
    const angle = -Math.PI/2 + (2*Math.PI*i)/n;
    const sx = cx + SEG_RADIUS*Math.cos(angle);
    const sy = cy + SEG_RADIUS*Math.sin(angle);

    // Yatay konuma göre text-align ve pozisyon
    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);
    const isRight  = cosA >  0.3;
    const isLeft   = cosA < -0.3;
    const lblAlign = isRight ? 'left' : (isLeft ? 'right' : 'center');

    // Etiket: dairenin dış kenarından başlıyor
    // transform:translate(-50%,-50%) ile btn merkezi sx,sy
    // etiket sol kenarı/sağ kenarı daireden LBL_DIST uzakta
    let lblStyle = '';
    if(isRight){
      // Etiket dairenin sağında
      lblStyle = `left:${CIRC_R + LBL_GAP}px; top:50%; transform:translateY(-50%); text-align:left;`;
    } else if(isLeft){
      // Etiket dairenin solunda
      lblStyle = `right:${CIRC_R + LBL_GAP}px; top:50%; transform:translateY(-50%); text-align:right;`;
    } else if(sinA < 0){
      // Üstte
      lblStyle = `bottom:${CIRC_R + LBL_GAP}px; left:50%; transform:translateX(-50%); text-align:center;`;
    } else {
      // Altta
      lblStyle = `top:${CIRC_R + LBL_GAP}px; left:50%; transform:translateX(-50%); text-align:center;`;
    }

    const fullName = cat.n.replace('\n','<br>');

    const btn = document.createElement('div');
    btn.className = 'seg-btn';
    btn.id = 'seg-'+cat.id;
    btn.style.left = sx+'px';
    btn.style.top  = sy+'px';
    btn.innerHTML = `
      <div class="seg-inner" style="background:${cat.c}">
        <div class="seg-inner-txt">${fullName}</div>
      </div>`;
    btn.addEventListener('click', ()=>selectCat(cat));
    cont.appendChild(btn);
  });
}

function selectCat(cat){
  if(wheelMode==='sub' && activeCat && activeCat.id===cat.id){
    resetWheel(); return;
  }
  wheelMode='sub';
  activeCat=cat;

  // Merkezi güncelle
  document.getElementById('centerCityLine').style.display='none';
  document.getElementById('centerTitle').textContent = cat.n.replace('\n',' ');
  document.getElementById('centerSub').textContent = cat.subs.length+' alt kategori';

  // Segment'leri küçült / öne çıkar
  CATS.forEach(c=>{
    const btn = document.getElementById('seg-'+c.id);
    if(c.id===cat.id){
      btn.style.transform='translate(-50%,-50%) scale(1.12)';
      btn.style.opacity='1';
      btn.style.zIndex='9';
      btn.querySelector('.seg-inner').style.boxShadow=`0 0 0 3px ${cat.c}, 0 4px 20px rgba(0,0,0,.4)`;
    } else {
      btn.style.transform='translate(-50%,-50%) scale(0.7)';
      btn.style.opacity='0.35';
      btn.style.zIndex='4';
      btn.querySelector('.seg-inner').style.boxShadow='';
    }
  });

  // Canvas'a renkli çizgi çiz
  drawSubConnectors(cat);

  // Alt kategorileri yerleştir
  buildSubNodes(cat);
}

function drawSubConnectors(cat){
  const canvas = document.getElementById('wheelCanvas');
  const wrap   = document.getElementById('wheelWrap');
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  // Zayıf segment çizgileri
  const n = CATS.length;
  CATS.forEach((_,i)=>{
    const angle = -Math.PI/2+(2*Math.PI*i)/n;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+SEG_RADIUS*Math.cos(angle), cy+SEG_RADIUS*Math.sin(angle));
    ctx.strokeStyle='rgba(255,255,255,0.04)';
    ctx.lineWidth=1;
    ctx.stroke();
  });

  // Renkli sub çizgileri
  const subs = cat.subs;
  subs.forEach((_, i)=>{
    const angle = -Math.PI/2+(2*Math.PI*i)/subs.length;
    const ex = cx+SUB_RADIUS*Math.cos(angle);
    const ey = cy+SUB_RADIUS*Math.sin(angle);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(ex,ey);
    ctx.setLineDash([4,3]);
    ctx.strokeStyle = cat.c+'99';
    ctx.lineWidth=1.6;
    ctx.stroke();
    ctx.setLineDash([]);
  });
}

function buildSubNodes(cat){
  const wrap = document.getElementById('wheelWrap');
  const cont = document.getElementById('subContainer');
  cont.innerHTML='';
  const cx = wrap.offsetWidth/2;
  const cy = wrap.offsetHeight/2;
  const n  = cat.subs.length;

  cat.subs.forEach((sub,i)=>{
    const angle = -Math.PI/2+(2*Math.PI*i)/n;
    const sx = cx+SUB_RADIUS*Math.cos(angle);
    const sy = cy+SUB_RADIUS*Math.sin(angle);
    const cnt = PLACES.filter(p=>p.cat===cat.id&&p.sub===sub).length;
    const bgL = cat.c+'22';

    const nd = document.createElement('div');
    nd.className='sub-node';
    nd.style.left=sx+'px';
    nd.style.top =sy+'px';
    nd.style.setProperty('--c',cat.c);
    nd.innerHTML=`
      <div class="sub-inner">
        <div class="sub-ico" style="background:${bgL}">${ICONS[cat.id]||''}</div>
        <div class="sub-name">${sub}</div>
        <div class="sub-cnt">${cnt} mekan</div>
      </div>`;
    nd.addEventListener('click',()=>{
      resetWheel();
      toMapFilter(cat.id,sub);
    });
    cont.appendChild(nd);
    setTimeout(()=>nd.classList.add('show'), 30+i*45);
  });
}

function makeSVG(color,letter,size){
  const h=Math.round(size*1.24);
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${h}" viewBox="0 0 ${size} ${h}"><path d="M${size/2} 0C${size*.224} 0 0 ${size*.336} 0 ${size*.75}c0 ${size*.537} ${size/2} ${size*.49} ${size/2} ${size*.49}S${size} ${size*1.287} ${size} ${size*.75}C${size} ${size*.336} ${size*.776} 0 ${size/2} 0z" fill="${color}"/><circle cx="${size/2}" cy="${size*.45}" r="${size*.32}" fill="white" opacity=".9"/><text x="${size/2}" y="${size*.6}" text-anchor="middle" font-size="${size*.34}" font-weight="bold" fill="${color}" font-family="Arial">${letter}</text></svg>`;
}

function updateMarkers(){
  if(!mapReady) return;
  markers.forEach(m=>m.setMap(null));markers=[];
  PLACES.filter(p=>{
    if(!activeFilter) return true;
    if(activeFilter.cat&&p.cat!==activeFilter.cat) return false;
    if(activeFilter.sub&&p.sub!==activeFilter.sub) return false;
    return true;
  }).forEach(pl=>{
    const cat=gc(pl.cat);
    const col=cat?cat.c:'#333';
    const svg=makeSVG(col,CAT_LETTER[pl.cat]||'•',34);
    const mk=new google.maps.Marker({
      position:{lat:pl.lat,lng:pl.lng},map,
      icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(34,42),anchor:new google.maps.Point(17,42)},
      animation:google.maps.Animation.DROP,
    });

  });
}

function fetchPlaceDetails(pl){
  const svc = getPlacesService();
  if(!svc){ document.getElementById('popLoading').style.display='none'; return; }

  const req = {
    query: pl.name + ' ' + pl.address + ' İstanbul',
    fields: ['place_id'],
    locationBias: new google.maps.LatLngBounds(
      {lat: pl.lat - 0.008, lng: pl.lng - 0.008},
      {lat: pl.lat + 0.008, lng: pl.lng + 0.008}
    )
  };

  try {
    svc.findPlaceFromQuery(req, (results, status) => {
      if(status === google.maps.places.PlacesServiceStatus.OK && results && results[0]){
        const pid = results[0].place_id;
        svc.getDetails({
          placeId: pid,
          fields: ['photos','rating','user_ratings_total','opening_hours',
                   'formatted_phone_number','website','url']
        }, (place, dstatus) => {
          document.getElementById('popLoading').style.display = 'none';
          if(dstatus === google.maps.places.PlacesServiceStatus.OK && place){
            renderPlaceDetails(place);
          }
        });
      } else {
        document.getElementById('popLoading').style.display = 'none';
      }
    });
  } catch(e) {
    document.getElementById('popLoading').style.display = 'none';
  }
}

function renderPlaceDetails(place){
  // Fotoğraflar
  if(place.photos && place.photos.length > 0){
    const photosEl = document.getElementById('popPhotos');
    photosEl.innerHTML = '';
    photosEl.style.display = 'block';

    const allPhotos = place.photos;
    const total = Math.min(allPhotos.length, 9);

    // İlk fotoğraf büyük - tam genişlik
    const mainUrl = allPhotos[0].getUrl({maxWidth:800, maxHeight:600});
    const mainImg = document.createElement('img');
    mainImg.className = 'pop-photos-main';
    mainImg.src = mainUrl;
    mainImg.alt = '';
    mainImg.onerror = () => mainImg.remove();
    mainImg.onclick = () => window.open(mainUrl, '_blank');
    photosEl.appendChild(mainImg);

    // Diğerleri yatay scroll satırında
    if(total > 1){
      const row = document.createElement('div');
      row.className = 'pop-photos-row';
      for(let i = 1; i < total; i++){
        const url = allPhotos[i].getUrl({maxWidth:400, maxHeight:300});
        const img = document.createElement('img');
        img.className = 'pop-photo';
        img.src = url;
        img.alt = '';
        img.onerror = () => img.remove();
        img.onclick = () => window.open(url, '_blank');
        row.appendChild(img);
      }
      photosEl.appendChild(row);
    }
  }

  // Rating
  if(place.rating){
    const stars = '★'.repeat(Math.round(place.rating)) + '☆'.repeat(5-Math.round(place.rating));
    const cnt = place.user_ratings_total ? `(${place.user_ratings_total.toLocaleString()})` : '';
    document.getElementById('popRating').innerHTML =
      `<span class="pop-stars">${stars}</span>
       <span class="pop-rating-num">${place.rating.toFixed(1)}</span>
       <span class="pop-rating-cnt">${cnt}</span>`;
    document.getElementById('popRating').style.display = 'flex';
  }

  // Çalışma saatleri
  if(place.opening_hours){
    const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
    const today = new Date().getDay();
    const isOpen = place.opening_hours.isOpen ? place.opening_hours.isOpen() : null;
    const weekday = place.opening_hours.weekday_text || [];

    const badge = document.getElementById('popOpenBadge');
    if(isOpen === true){ badge.textContent='Açık'; badge.className='pop-open-badge open'; }
    else if(isOpen === false){ badge.textContent='Kapalı'; badge.className='pop-open-badge closed'; }
    else { badge.textContent='Bilinmiyor'; badge.className='pop-open-badge unknown'; }

    const todayText = weekday[today] || weekday[(today+1)%7] || 'Bilgi yok';
    // Sadece saati göster
    const todayHour = todayText.split(': ')[1] || todayText;
    document.getElementById('popHoursToday').textContent = todayHour;

    const listEl = document.getElementById('popHoursList');
    listEl.innerHTML = weekday.map((d, i) => {
      const isToday = d.toLowerCase().startsWith(days[today].toLowerCase()) ||
                      i === ((today + 6) % 7);
      return `<div class="pop-hours-row${i===today?' today':''}">${d}</div>`;
    }).join('');

    document.getElementById('popHours').style.display = 'block';
  }

  // İletişim
  const contactEl = document.getElementById('popContact');
  contactEl.innerHTML = '';
  if(place.formatted_phone_number){
    contactEl.innerHTML += `<div class="pop-contact-row">
      <span class="pop-contact-ico">📞</span>
      <a href="tel:${place.formatted_phone_number}" style="color:inherit;text-decoration:none">${place.formatted_phone_number}</a>
    </div>`;
  }
  if(place.website){
    const domain = place.website.replace(/https?:\/\/(www\.)?/,'').split('/')[0];
    contactEl.innerHTML += `<div class="pop-contact-row">
      <span class="pop-contact-ico">🌐</span>
      <a href="${place.website}" target="_blank" style="color:#64B5F6;text-decoration:none">${domain}</a>
    </div>`;
  }
  if(contactEl.innerHTML) contactEl.style.display = 'flex';

  // Google Maps URL'ini kaydet
  if(place.url) document.getElementById('popMapsBtn').dataset.url = place.url;
}

function goToMyLocation(){
  if(!navigator.geolocation){
    showToast('Konum desteklenmiyor'); return;
  }
  const btn = document.getElementById('btnMyLocation');
  btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(pos => {
    btn.textContent = '📍';
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    map.setCenter({lat, lng});
    map.setZoom(16);
    // Mavi konum noktası
    if(userMarker) userMarker.setMap(null);
    const div = document.createElement('div');
    div.className = 'location-pulse';
    userMarker = new google.maps.OverlayView();
    userMarker.onAdd = function(){
      this.getPanes().overlayMouseTarget.appendChild(div);
    };
    userMarker.draw = function(){
      const p = this.getProjection().fromLatLngToDivPixel(new google.maps.LatLng(lat,lng));
      div.style.position = 'absolute';
      div.style.left = (p.x-8)+'px';
      div.style.top  = (p.y-8)+'px';
    };
    userMarker.onRemove = function(){ div.parentNode && div.parentNode.removeChild(div); };
    userMarker.setMap(map);

    // Otomatik yakın mekan ara
    handleMapTap(lat, lng, true);
  }, () => {
    btn.textContent = '📍';
    showToast('Konum alınamadı. Lütfen izin verin.');
  }, {enableHighAccuracy:true, timeout:8000});
}

function handleMapTap(lat, lng, fromLocation){
  nearbyPoint = {lat, lng};
  tapModeActive = false;
  document.getElementById('btnNearbyTap').style.background = '#64B5F6';
  map.setOptions({cursor:''});

  // Çember çiz
  if(nearbyCircle) nearbyCircle.setMap(null);
  nearbyCircle = new google.maps.Circle({
    center:{lat,lng}, radius:nearbyRadius,
    map: map,
    fillColor:'#64B5F6', fillOpacity:0.12,
    strokeColor:'#64B5F6', strokeOpacity:0.6, strokeWeight:2
  });

  // Haritayı ortala
  map.setCenter({lat, lng});
  if(map.getZoom() < 15) map.setZoom(16);

  showNearbyPlaces(lat, lng, fromLocation);
}

function showNearbyPlaces(lat, lng, fromLocation){
  const found = [];
  PLACES.forEach(p => {
    const d = getDistanceM(lat, lng, p.lat, p.lng);
    if(d <= nearbyRadius) found.push({...p, _dist: d});
  });
  found.sort((a,b) => a._dist - b._dist);

  const panel = document.getElementById('nearbyPanel');
  const list  = document.getElementById('nearbyList');
  const title = document.getElementById('nearbyTitle');
  const sub   = document.getElementById('nearbySub');

  title.textContent = fromLocation ? 'Etrafımdaki Mekanlar' : 'Bu Noktanın Yakını';
  sub.textContent = found.length > 0
    ? `${nearbyRadius}m içinde ${found.length} mekan bulundu`
    : `${nearbyRadius}m içinde mekan bulunamadı`;

  list.innerHTML = '';
  if(found.length === 0){
    list.innerHTML = '<div style="text-align:center;padding:32px 16px;color:rgba(255,255,255,.3);font-size:13px;font-weight:700;">Bu yarıçapta mekan yok<br><span style="font-size:11px">Yarıçapı artırmayı deneyin</span></div>';
  } else {
    found.forEach(p => {
      const cat = gc(p.cat);
      const col = cat ? cat.c : '#666';
      const item = document.createElement('div');
      item.className = 'nearby-item';
      item.innerHTML = `
        <div class="nearby-ico" style="background:${col}22">
          ${ICONS[p.cat] || '📍'}
        </div>
        <div class="nearby-info">
          <div class="nearby-name">${p.name}</div>
          <div class="nearby-meta">${p.address}</div>
          <span class="nearby-badge" style="background:${col}">${cat ? cat.n.replace('\n',' ') : ''}</span>
        </div>
        <div class="nearby-dist">${p._dist < 1000 ? Math.round(p._dist)+'m' : (p._dist/1000).toFixed(1)+'km'}</div>`;
      item.onclick = () => {
        closeNearby();
        showPopup(p);
        map.setCenter({lat:p.lat, lng:p.lng});
      };
      list.appendChild(item);
    });
  }

  panel.classList.add('open');
  document.querySelector('.tab-bar') && document.querySelector('.tab-bar').classList.add('hidden');
}

function setRadius(r, btn){
  nearbyRadius = r;
  document.querySelectorAll('.radius-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if(nearbyCircle) nearbyCircle.setRadius(r);
  if(nearbyPoint) showNearbyPlaces(nearbyPoint.lat, nearbyPoint.lng, false);
}

function closeNearby(){
  document.getElementById('nearbyPanel').classList.remove('open');
  if(nearbyCircle){ nearbyCircle.setMap(null); nearbyCircle = null; }
  document.querySelector('.tab-bar') && document.querySelector('.tab-bar').classList.remove('hidden');
}

function getDistanceM(lat1, lng1, lat2, lng2){
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,60,.95);color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 2800);
}

function closePopup(){
  document.getElementById('popup').classList.remove('visible');
  document.getElementById('popSvFrame').src = '';
  // Navbar geri göster
  document.querySelector('.tab-bar') && document.querySelector('.tab-bar').classList.remove('hidden');
}

/* ════════════════ LIST ════════════════ */
function buildList(){
  const el=document.getElementById('listEl');
  el.innerHTML='';
  PLACES.forEach(p=>{
    const cat=gc(p.cat);
    const bg=cat?cat.c+'25':'rgba(255,255,255,.1)';
    const d=document.createElement('div');
    d.className='list-item';
    d.onclick=()=>{ toMapFilter(p.cat,p.sub); };
    d.innerHTML=`
      <div class="list-item-ico" style="background:${bg}">${ICONS[p.cat]||''}</div>
      <div>
        <div class="list-item-name">${p.name}</div>
        <div class="list-item-sub">${p.sub||''}</div>
        <div class="list-item-addr">📍 ${p.address}</div>
      </div>`;
    el.appendChild(d);
  });
}

/* ════════════════ NAV ════════════════ */
function goTab(id,el){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-'+id).classList.add('active');
  if(id==='map'){if(!mapReady&&window.google)initMap();updateMarkers();buildChips();}
  if(id==='list') buildList();
  if(id==='home'){ resetWheel(); setTimeout(drawWheelConnectors,50); }
}

function toMapFilter(catId,sub){
  activeFilter={cat:catId,sub};
  goTab('map',document.getElementById('tab-map'));
  if(!mapReady&&window.google)initMap();
  setTimeout(()=>{updateMarkers();buildChips();},100);
}

function switchToMap(){
  goTab('map',document.getElementById('tab-map'));
}

/* ════════════════ AUTH ════════════════ */
function promptLogin(){
  document.getElementById('pwInput').value='';
  document.getElementById('pwError').style.display='none';
  document.getElementById('loginSheet').classList.add('open');
  setTimeout(()=>document.getElementById('pwInput').focus(),200);
}
function checkPw(){
  if(document.getElementById('pwInput').value===PW){
    document.getElementById('loginSheet').classList.remove('open');
    isMod=true;
    document.getElementById('fabBtn').style.display='flex';
    document.getElementById('profileRole').textContent='Moderatör';
    document.getElementById('modBtn').style.display='none';
    document.getElementById('modLogout').style.display='block';
    showNotif('✏️ Moderatör modu aktif!');
  } else {
    document.getElementById('pwError').style.display='block';
    document.getElementById('pwInput').value='';
  }
}
function logoutMod(){
  isMod=false;
  document.getElementById('fabBtn').style.display='none';
  document.getElementById('profileRole').textContent='Ziyaretçi';
  document.getElementById('modBtn').style.display='block';
  document.getElementById('modLogout').style.display='none';
  showNotif('👁️ Görüntüleme moduna geçildi');
}

/* ════════════════ ADD PLACE ════════════════ */
function openAddSheet(){
  if(!isMod) return;
  const cs=document.getElementById('fCat');
  cs.innerHTML='<option value="">Kategori seçin…</option>';
  CATS.forEach(c=>cs.innerHTML+=`<option value="${c.id}">${c.n.replace('\n',' ')}</option>`);
  document.getElementById('fSub').innerHTML='<option value="">Alt kategori…</option>';
  selTags=[];
  document.getElementById('fTagsEl').innerHTML=TAGS.map(t=>`<button class="form-tag" onclick="toggleTag(this,'${t}')">${t}</button>`).join('');
  ['fName','fAddr','fLat','fLng','fDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('addSheet').classList.add('open');
}
function fillSubs(){
  const cat=CATS.find(c=>c.id===document.getElementById('fCat').value);
  const sel=document.getElementById('fSub');
  sel.innerHTML='<option value="">Alt kategori…</option>';
  if(cat) cat.subs.forEach(s=>sel.innerHTML+=`<option value="${s}">${s}</option>`);
}
function toggleTag(el,tag){
  el.classList.toggle('on');
  selTags=el.classList.contains('on')?[...selTags,tag]:selTags.filter(t=>t!==tag);
}
function savePlace(){
  const name=document.getElementById('fName').value.trim();
  const cat=document.getElementById('fCat').value;
  const addr=document.getElementById('fAddr').value.trim();
  if(!name||!cat||!addr){showNotif('⚠️ Zorunlu alanları doldurun');return;}
  const lat=parseFloat(document.getElementById('fLat').value)||41.0082+(Math.random()-.5)*.05;
  const lng=parseFloat(document.getElementById('fLng').value)||28.9784+(Math.random()-.5)*.1;
  PLACES.push({id:nid++,name,cat,sub:document.getElementById('fSub').value,address:addr,lat,lng,
    desc:document.getElementById('fDesc').value.trim(),tags:[...selTags]});
  document.getElementById('addSheet').classList.remove('open');
  buildList();
  if(mapReady) updateMarkers();
  showNotif(`✓ "${name}" eklendi`);
}

/* ════════════════ NOTIF ════════════════ */
function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

/* ════════════════ SHEETS CLOSE ════════════════ */
['addSheet','loginSheet'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

/* ════════════════ INIT ════════════════ */
function tryInitWheel(){
  const wrap = document.getElementById('wheelWrap');
  if(!wrap || wrap.offsetWidth === 0){
    // Boyut henüz hazır değil, 50ms sonra tekrar dene
    setTimeout(tryInitWheel, 50);
    return;
  }
  initWheel();
  buildList();
}

window.addEventListener('load', tryInitWheel);
window.addEventListener('resize',()=>{
  if(wheelMode==='home') drawWheelConnectors();
  else drawSubConnectors(activeCat);
  buildSegments();
  if(wheelMode==='sub') buildSubNodes(activeCat);
});
