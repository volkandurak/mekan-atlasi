<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mekan Atlası: İstanbul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0e0e0e;
      --parchment: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --rust: #8b3a2a;
      --teal: #2a6b6e;
      --cream: #faf7f0;
      --muted: #6b6257;
      --border: rgba(201,168,76,0.25);
      --sidebar-w: 380px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--ink);
      color: var(--parchment);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      background: var(--ink);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 200;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
    }

    .logo-sub {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .logo-ornament {
      font-size: 22px;
      color: var(--gold);
      margin-right: 8px;
      line-height: 1;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mode-badge {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-badge.moderator {
      background: var(--gold);
      color: var(--ink);
      font-weight: 700;
    }

    .mode-badge.viewer {
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .mode-badge.viewer.active {
      border-color: var(--gold);
      color: var(--gold);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--parchment);
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      padding: 6px 14px 6px 34px;
      border-radius: 2px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 13px;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: #111;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .category-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .category-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
    }

    .category-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .category-scroll::-webkit-scrollbar { width: 4px; }
    .category-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cat-item {
      border-bottom: 1px solid rgba(201,168,76,0.08);
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cat-header:hover { background: rgba(201,168,76,0.05); }
    .cat-header.open { background: rgba(201,168,76,0.08); }

    .cat-emoji { font-size: 16px; flex-shrink: 0; }

    .cat-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--parchment);
      flex: 1;
      line-height: 1.3;
    }

    .cat-count {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
    }

    .cat-arrow {
      color: var(--muted);
      font-size: 10px;
      transition: transform 0.2s;
    }

    .cat-header.open .cat-arrow { transform: rotate(90deg); color: var(--gold); }

    .sub-list {
      display: none;
      padding: 4px 0 8px 0;
      background: rgba(0,0,0,0.3);
    }

    .sub-list.visible { display: block; }

    .sub-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 20px 7px 46px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .sub-item:hover { background: rgba(201,168,76,0.06); }

    .sub-item.active { background: rgba(201,168,76,0.12); }
    .sub-item.active .sub-name { color: var(--gold); }

    .sub-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      border: 1px solid var(--muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .sub-item.active .sub-dot,
    .sub-item:hover .sub-dot {
      background: var(--gold);
      border-color: var(--gold);
    }

    .sub-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.3;
      transition: color 0.15s;
    }

    .sub-count-badge {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--teal);
      background: rgba(42,107,110,0.15);
      padding: 1px 5px;
      border-radius: 2px;
    }

    /* ── MAP AREA ── */
    .map-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ── MAP OVERLAY UI ── */
    .map-overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .map-stat-card {
      background: rgba(14,14,14,0.92);
      border: 1px solid var(--border);
      padding: 10px 14px;
      min-width: 160px;
      pointer-events: all;
      backdrop-filter: blur(10px);
    }

    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--gold);
      line-height: 1;
    }

    .stat-sub {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      margin-top: 2px;
    }

    /* ── BOTTOM PANEL ── */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: linear-gradient(to top, rgba(14,14,14,0.98) 0%, transparent 100%);
      padding: 20px 24px 16px;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .filter-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      pointer-events: all;
    }

    .pill {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 1px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--muted);
      background: rgba(14,14,14,0.8);
    }

    .pill:hover { border-color: var(--gold); color: var(--gold); }
    .pill.active { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight: 700; }

    .map-credit {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      color: var(--muted);
      pointer-events: all;
    }

    /* ── ADD PLACE MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: #111;
      border: 1px solid var(--border);
      width: 520px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      padding: 22px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--gold);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 2px 6px;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--parchment); }

    .modal-body { padding: 20px 24px; }

    .form-row { margin-bottom: 16px; }

    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--parchment);
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      padding: 9px 12px;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--gold);
    }

    .form-textarea { height: 80px; resize: vertical; }

    .form-select option { background: #1a1a1a; }

    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

    .tag {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 1px;
      font-size: 11px;
      font-family: 'Cormorant Garamond', serif;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tag:hover { border-color: var(--gold); color: var(--gold); }
    .tag.sel { background: var(--gold); color: var(--ink); border-color: var(--gold); }

    .btn-primary {
      background: var(--gold);
      color: var(--ink);
      border: none;
      padding: 11px 28px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      font-weight: 700;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn-primary:hover { background: var(--gold-light); }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 11px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      margin-top: 8px;
      margin-left: 8px;
    }

    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    /* ── ADD BUTTON ── */
    .fab {
      position: absolute;
      bottom: 60px;
      right: 16px;
      z-index: 100;
      background: var(--gold);
      color: var(--ink);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 2px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
      transition: all 0.2s;
      font-weight: 700;
    }

    .fab:hover { background: var(--gold-light); transform: scale(1.05); }

    .fab-label {
      position: absolute;
      bottom: 60px;
      right: 72px;
      z-index: 100;
      background: rgba(14,14,14,0.92);
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .fab:hover + .fab-label { opacity: 1; }

    /* ── PLACE INFO POPUP ── */
    .place-popup {
      display: none;
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      background: rgba(14,14,14,0.96);
      border: 1px solid var(--border);
      padding: 16px 20px;
      min-width: 280px;
      max-width: 380px;
      animation: popupIn 0.2s ease;
      backdrop-filter: blur(10px);
    }

    @keyframes popupIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .place-popup.visible { display: block; }

    .popup-cat {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .popup-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--parchment);
      margin-bottom: 4px;
    }

    .popup-address {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .popup-desc {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      color: rgba(245,240,232,0.7);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .popup-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }

    .popup-tag {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      padding: 3px 7px;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .popup-close {
      position: absolute;
      top: 10px; right: 10px;
      background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 14px;
    }

    /* ── LOADING ── */
    .map-loading {
      position: absolute;
      inset: 0;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      gap: 16px;
    }

    .loading-logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--gold);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── NOTIFICATION ── */
    .notif {
      position: fixed;
      top: 74px;
      right: 16px;
      z-index: 600;
      background: rgba(14,14,14,0.96);
      border: 1px solid var(--gold);
      padding: 10px 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      color: var(--gold);
      border-radius: 2px;
      display: none;
      animation: notifIn 0.25s ease;
    }

    @keyframes notifIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── MAP DARK STYLE (applied via JS) ── */
    .gm-style .gm-style-iw-c {
      background: #111 !important;
      border: 1px solid var(--border) !important;
      border-radius: 2px !important;
    }

    /* ── LEGEND ── */
    .legend {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 100;
      display: none;
    }

    .legend.visible { display: block; }

    .legend-inner {
      background: rgba(14,14,14,0.92);
      border: 1px solid var(--border);
      padding: 12px 14px;
      backdrop-filter: blur(10px);
    }

    .legend-title {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      padding: 2px 0;
      transition: opacity 0.15s;
    }

    .legend-item:hover { opacity: 0.7; }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      color: var(--parchment);
      white-space: nowrap;
    }

    /* ── TOGGLE SIDEBAR ── */
    .toggle-sidebar {
      position: absolute;
      left: var(--sidebar-w);
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      background: var(--ink);
      border: 1px solid var(--border);
      border-left: none;
      color: var(--muted);
      padding: 8px 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      line-height: 1;
    }

    .toggle-sidebar:hover { color: var(--gold); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 100vw; }
      .sidebar { position: fixed; left: 0; top: 60px; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform 0.3s; }
      .sidebar.open { transform: translateX(0); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-ornament">✦</span>
    <span class="logo-title">Mekan Atlası</span>
    <span class="logo-sub">İstanbul</span>
  </div>
  <div class="header-actions">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Mekan ara…" oninput="filterPlaces(this.value)">
    </div>
    <button class="mode-badge viewer active" id="viewerBtn" onclick="setMode('viewer')">Görüntüle</button>
    <button class="mode-badge moderator" id="modBtn" onclick="setMode('moderator')">Moderatör</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="category-header">
      <h3>Kategoriler & Mekan Türleri</h3>
    </div>
    <div class="category-scroll" id="categoryList"></div>
  </div>

  <!-- TOGGLE SIDEBAR -->
  <button class="toggle-sidebar" id="sidebarToggle" onclick="toggleSidebar()">◀</button>

  <!-- MAP AREA -->
  <div class="map-area">
    <!-- Loading -->
    <div class="map-loading" id="mapLoading">
      <div class="loading-logo">✦ Mekan Atlası</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">İstanbul Haritası Yükleniyor…</div>
    </div>

    <div id="map"></div>

    <!-- Stats -->
    <div class="map-overlay">
      <div class="map-stat-card">
        <div class="stat-label">Toplam Mekan</div>
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-sub">İstanbul geneli</div>
      </div>
      <div class="map-stat-card">
        <div class="stat-label">Aktif Filtre</div>
        <div class="stat-value" id="activeFilter" style="font-size:13px; padding-top:4px">Tümü</div>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend visible" id="legend">
      <div class="legend-inner" id="legendInner"></div>
    </div>

    <!-- FAB -->
    <button class="fab" id="addBtn" onclick="openModal()" style="display:none" title="Mekan Ekle">+</button>
    <div class="fab-label">Mekan Ekle</div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <div class="filter-pills" id="filterPills"></div>
      <div class="map-credit">© Mekan Atlası İstanbul</div>
    </div>

    <!-- Popup -->
    <div class="place-popup" id="placePopup">
      <button class="popup-close" onclick="closePopup()">✕</button>

let nextId = PLACES.length + 1;
let map, markers = [], activeCategory = null, activeSub = null;
let isModerator = false;
let sidebarOpen = true;
let selectedTags = [];

// ════════════════════════════════════════════════
//  SIDEBAR BUILD
// ════════════════════════════════════════════════

function buildSidebar() {
  const list = document.getElementById('categoryList');
  list.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const count = PLACES.filter(p => p.cat === cat.id).length;
    const div = document.createElement('div');
    div.className = 'cat-item';
    div.innerHTML = `
      <div class="cat-header" onclick="toggleCat('${cat.id}', this)" id="cat-hdr-${cat.id}">
        <span class="cat-emoji">${cat.emoji}</span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-count">${count}</span>
        <span class="cat-arrow">▶</span>
      </div>
      <div class="sub-list" id="sub-${cat.id}">
        ${cat.subs.map(s => {
          const sc = PLACES.filter(p => p.cat === cat.id && p.sub === s).length;
          return `<div class="sub-item" onclick="filterBySub('${cat.id}','${s}', this)" data-sub="${s}">
            <span class="sub-dot"></span>
            <span class="sub-name">${s}</span>
            ${sc > 0 ? `<span class="sub-count-badge">${sc}</span>` : ''}
          </div>`;
        }).join('')}
      </div>`;
    list.appendChild(div);
  });
}

function toggleCat(catId, hdr) {
  const sub = document.getElementById('sub-' + catId);
  const isOpen = sub.classList.contains('visible');
  // close all
  document.querySelectorAll('.sub-list').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('open'));
  if (!isOpen) {
    sub.classList.add('visible');
    hdr.classList.add('open');
    filterByCategory(catId);
  } else {
    clearFilters();
  }
}

function filterByCategory(catId) {
  activeCategory = catId;
  activeSub = null;
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
  updateMap();
  const cat = CATEGORIES.find(c => c.id === catId);
  document.getElementById('activeFilter').textContent = cat ? cat.emoji + ' ' + cat.name.split(' ')[0] : 'Tümü';
  updateFilterPills();
}

function filterBySub(catId, sub, el) {
  activeCategory = catId;
  activeSub = sub;
  document.querySelectorAll('.sub-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  updateMap();
  document.getElementById('activeFilter').textContent = sub;
  updateFilterPills();
}

function clearFilters() {
  activeCategory = null;
  activeSub = null;
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('open'));
  document.querySelectorAll('.sub-list').forEach(s => s.classList.remove('visible'));
  document.getElementById('activeFilter').textContent = 'Tümü';
  updateMap();
  updateFilterPills();
}

// ════════════════════════════════════════════════
//  FILTER PILLS (bottom bar quick filters)
// ════════════════════════════════════════════════
function updateFilterPills() {
  const pills = document.getElementById('filterPills');
  const activeCats = activeCategory
    ? [CATEGORIES.find(c => c.id === activeCategory)]
    : CATEGORIES.slice(0, 5);
  pills.innerHTML = `<button class="pill ${!activeCategory ? 'active' : ''}" onclick="clearFilters()">Tümü</button>`;
  CATEGORIES.forEach(cat => {
    const active = activeCategory === cat.id;
    pills.innerHTML += `<button class="pill ${active ? 'active' : ''}" onclick="filterByCategory('${cat.id}')">${cat.emoji} ${cat.name.split(' ')[0]}</button>`;
  });
}

// ════════════════════════════════════════════════
//  MAP
// ════════════════════════════════════════════════
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 41.0082, lng: 28.9784 },
    zoom: 13,
    mapTypeId: 'roadmap',
    styles: DARK_MAP_STYLE,
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    gestureHandling: 'greedy'
  });

  // Click to set coords in modal
  map.addListener('click', (e) => {
    if (isModerator) {
      document.getElementById('fLat').value = e.latLng.lat().toFixed(5);
      document.getElementById('fLng').value = e.latLng.lng().toFixed(5);
      showNotif('📍 Konum seçildi — formu doldurmaya devam edin');
      openModal();
    }
  });

  mapReady = true;
  document.getElementById('mapLoading').style.display = 'none';
  document.getElementById('totalCount').textContent = PLACES.length;
  updateMap();
  buildLegend();
  updateFilterPills();
}

function getCatColor(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  return cat ? cat.color : '#c9a84c';
}

function getCatEmoji(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  return cat ? cat.emoji : '📍';
}

function updateMap() {
  if (!mapReady) return;
  // Remove existing markers
  markers.forEach(m => m.setMap(null));
  markers = [];

  const filtered = PLACES.filter(p => {
    if (activeCategory && p.cat !== activeCategory) return false;
    if (activeSub && p.sub !== activeSub) return false;
    return true;
  });

  filtered.forEach(place => {
    const color = getCatColor(place.cat);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
      <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24s16-14 16-24C32 7.163 24.837 0 16 0z" fill="${color}" opacity="0.9"/>
      <circle cx="16" cy="16" r="7" fill="#0e0e0e" opacity="0.6"/>
      <text x="16" y="20" text-anchor="middle" font-size="10" fill="#f5f0e8">${getCatEmoji(place.cat)}</text>
    </svg>`;

    const icon = {
      url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
      scaledSize: new google.maps.Size(32, 40),
      anchor: new google.maps.Point(16, 40)
    };

    const marker = new google.maps.Marker({
      position: { lat: place.lat, lng: place.lng },
      map,
      icon,
      title: place.name,
      animation: google.maps.Animation.DROP
    });

    marker.addListener('click', () => showPopup(place));
    markers.push(marker);
  });

  document.getElementById('totalCount').textContent = filtered.length;
}

function showPopup(place) {
  const cat = CATEGORIES.find(c => c.id === place.cat);
  document.getElementById('popupCat').textContent = (cat ? cat.emoji + ' ' : '') + (cat ? cat.name : '');
  document.getElementById('popupName').textContent = place.name;
  document.getElementById('popupAddress').textContent = '📍 ' + place.address;
  document.getElementById('popupDesc').textContent = place.desc || '';
  const tagsDiv = document.getElementById('popupTags');
  tagsDiv.innerHTML = (place.tags || []).map(t => `<span class="popup-tag">${t}</span>`).join('');
  document.getElementById('placePopup').classList.add('visible');
}

function closePopup() {
  document.getElementById('placePopup').classList.remove('visible');
}

// ════════════════════════════════════════════════
//  LEGEND
// ════════════════════════════════════════════════
function buildLegend() {
  const inner = document.getElementById('legendInner');
  inner.innerHTML = '<div class="legend-title">Kategoriler</div>';
  CATEGORIES.forEach(cat => {
    inner.innerHTML += `<div class="legend-item" onclick="filterByCategory('${cat.id}')">
      <div class="legend-dot" style="background:${cat.color}"></div>
      <div class="legend-name">${cat.emoji} ${cat.name.split(' ').slice(0,2).join(' ')}</div>
    </div>`;
  });
}

// ════════════════════════════════════════════════
//  MODERATOR MODE
// ════════════════════════════════════════════════
function setMode(mode) {
  isModerator = mode === 'moderator';
  document.getElementById('viewerBtn').classList.toggle('active', !isModerator);
  document.getElementById('modBtn').classList.toggle('active', isModerator);
  document.getElementById('addBtn').style.display = isModerator ? 'flex' : 'none';
  if (isModerator) {
    showNotif('✏️ Moderatör modu aktif — haritaya tıklayarak konum seçebilirsiniz');
  } else {
    showNotif('👁️ Görüntüleme moduna geçildi');
  }
}

// ════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════
function openModal() {
  // Populate cat select
  const catSel = document.getElementById('fCat');
  catSel.innerHTML = '<option value="">Seçin…</option>';
  CATEGORIES.forEach(c => {
    catSel.innerHTML += `<option value="${c.id}">${c.emoji} ${c.name}</option>`;
  });
  // Tags
  const tagList = document.getElementById('tagList');
  selectedTags = [];
  tagList.innerHTML = TAGS.map(t => `<span class="tag" onclick="toggleTag(this, '${t}')">${t}</span>`).join('');
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  // Clear
  ['fName','fAddress','fLat','fLng','fDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCat').value = '';
  document.getElementById('fSubCat').innerHTML = '<option value="">Seçin…</option>';
  selectedTags = [];
}

function updateSubCats() {
  const catId = document.getElementById('fCat').value;
  const subSel = document.getElementById('fSubCat');
  subSel.innerHTML = '<option value="">Seçin…</option>';
  const cat = CATEGORIES.find(c => c.id === catId);
  if (cat) {
    cat.subs.forEach(s => subSel.innerHTML += `<option value="${s}">${s}</option>`);
  }
}

function toggleTag(el, tag) {
  el.classList.toggle('sel');
  if (el.classList.contains('sel')) {
    selectedTags.push(tag);
  } else {
    selectedTags = selectedTags.filter(t => t !== tag);
  }
}

function submitPlace() {
  const name = document.getElementById('fName').value.trim();
  const cat = document.getElementById('fCat').value;
  const sub = document.getElementById('fSubCat').value;
  const address = document.getElementById('fAddress').value.trim();
  const lat = parseFloat(document.getElementById('fLat').value);
  const lng = parseFloat(document.getElementById('fLng').value);
  const desc = document.getElementById('fDesc').value.trim();

  if (!name || !cat || !address) {
    showNotif('⚠️ Lütfen zorunlu alanları doldurun');
    return;
  }

  // Geocode if no lat/lng
  const finalLat = isNaN(lat) ? 41.0082 + (Math.random()-0.5)*0.05 : lat;
  const finalLng = isNaN(lng) ? 28.9784 + (Math.random()-0.5)*0.1 : lng;

  const place = {
    id: nextId++,
    name, cat, sub, address,
    lat: finalLat, lng: finalLng,
    desc, tags: [...selectedTags]
  };

  PLACES.push(place);
  closeModal();
  buildSidebar();
  updateMap();
  buildLegend();
  updateFilterPills();
  showNotif(`✦ "${name}" başarıyla eklendi`);
  document.getElementById('totalCount').textContent = PLACES.length;
}

// ════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════
function filterPlaces(query) {
  if (!query.trim()) { clearFilters(); return; }
  activeCategory = null;
  activeSub = null;
  if (!mapReady) return;
  markers.forEach(m => m.setMap(null));
  markers = [];
  const q = query.toLowerCase();
  const filtered = PLACES.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.address.toLowerCase().includes(q) ||
    (p.desc||'').toLowerCase().includes(q) ||
    (p.sub||'').toLowerCase().includes(q)
  );
  filtered.forEach(place => {
    const color = getCatColor(place.cat);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
      <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24s16-14 16-24C32 7.163 24.837 0 16 0z" fill="${color}" opacity="0.9"/>
      <circle cx="16" cy="16" r="7" fill="#0e0e0e" opacity="0.6"/>
      <text x="16" y="20" text-anchor="middle" font-size="10" fill="#f5f0e8">${getCatEmoji(place.cat)}</text>
    </svg>`;
    const icon = {
      url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
      scaledSize: new google.maps.Size(32, 40),
      anchor: new google.maps.Point(16, 40)
    };
    const marker = new google.maps.Marker({ position: { lat: place.lat, lng: place.lng }, map, icon, title: place.name });
    marker.addListener('click', () => showPopup(place));
    markers.push(marker);
  });
  document.getElementById('totalCount').textContent = filtered.length;
  document.getElementById('activeFilter').textContent = `"${query}"`;
}

// ════════════════════════════════════════════════
//  SIDEBAR TOGGLE
// ════════════════════════════════════════════════
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarToggle');
  if (sidebarOpen) {
    sb.style.width = 'var(--sidebar-w)';
    btn.textContent = '◀';
    btn.style.left = 'var(--sidebar-w)';
  } else {
    sb.style.width = '0';
    btn.textContent = '▶';
    btn.style.left = '0';
  }
}

// ════════════════════════════════════════════════
//  NOTIFICATION
// ════════════════════════════════════════════════
function showNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}
